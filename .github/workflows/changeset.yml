name: Changesets

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  changesets:
    name: Version PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}

    defaults:
      run:
        working-directory: source

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CHANGESET_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - run: bun install --frozen-lockfile

      - id: changesets
        uses: changesets/action@v1
        with:
          cwd: source
          version: bun run version
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESET_TOKEN }}

  tag-release:
    name: Tag Release
    runs-on: ubuntu-latest
    needs: changesets
    if: |
      needs.changesets.outputs.hasChangesets == 'false' &&
      startsWith(github.event.head_commit.message, 'chore: version packages')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CHANGESET_TOKEN }}

      - name: Read version
        id: pkg
        run: |
          VERSION=$(node -p "require('./source/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.pkg.outputs.version }}"
          git push origin "v${{ steps.pkg.outputs.version }}"
