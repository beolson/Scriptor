name: Release

on:
  push:
    tags: ['v*']

jobs:
  main-branch-check:
    name: Assert tag is on main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assert tag is reachable from main
        run: |
          git fetch origin main
          git merge-base --is-ancestor HEAD origin/main || \
            (echo "Tag is not on main branch — aborting release." && exit 1)

  tui-release:
    name: Build TUI Binaries & Release
    runs-on: ubuntu-latest
    needs: main-branch-check

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binaries
        working-directory: tui
        run: |
          bun build src/index.ts --compile --target=bun-linux-x64    --outfile ../dist/scriptor-linux-x64
          bun build src/index.ts --compile --target=bun-linux-arm64  --outfile ../dist/scriptor-linux-arm64
          bun build src/index.ts --compile --target=bun-darwin-x64   --outfile ../dist/scriptor-darwin-x64
          bun build src/index.ts --compile --target=bun-darwin-arm64 --outfile ../dist/scriptor-darwin-arm64
          bun build src/index.ts --compile --target=bun-windows-x64   --outfile ../dist/scriptor-windows-x64.exe
          bun build src/index.ts --compile --target=bun-windows-arm64 --outfile ../dist/scriptor-windows-arm64.exe

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/scriptor-linux-x64
            dist/scriptor-linux-arm64
            dist/scriptor-darwin-x64
            dist/scriptor-darwin-arm64
            dist/scriptor-windows-x64.exe
            dist/scriptor-windows-arm64.exe

  web-release:
    name: Build Web & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: main-branch-check

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    concurrency:
      group: pages-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        working-directory: web
        env:
          NEXT_PUBLIC_VERSION: ${{ github.ref_name }}
        run: bun run build

      - name: Install Playwright browsers
        working-directory: web
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: web
        run: bun run test:e2e

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
