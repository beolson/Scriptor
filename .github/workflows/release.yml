name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: source
        run: bun install --frozen-lockfile

      - name: Run tests
        working-directory: source
        run: bun test

      - name: Run Biome lint check
        working-directory: source
        run: bun run lint

      - name: Build binaries
        working-directory: source
        run: |
          bun build src/index.ts --compile --target=bun-linux-x64   --outfile ../dist/scriptor-linux-x64
          bun build src/index.ts --compile --target=bun-linux-arm64  --outfile ../dist/scriptor-linux-arm64
          bun build src/index.ts --compile --target=bun-darwin-x64   --outfile ../dist/scriptor-darwin-x64
          bun build src/index.ts --compile --target=bun-darwin-arm64 --outfile ../dist/scriptor-darwin-arm64
          bun build src/index.ts --compile --target=bun-windows-x64   --outfile ../dist/scriptor-windows-x64.exe
          bun build src/index.ts --compile --target=bun-windows-arm64 --outfile ../dist/scriptor-windows-arm64.exe

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/scriptor-linux-x64
            dist/scriptor-linux-arm64
            dist/scriptor-darwin-x64
            dist/scriptor-darwin-arm64
            dist/scriptor-windows-x64.exe
            dist/scriptor-windows-arm64.exe
