  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs:
      - build

    concurrency:
      group: pages-deploy
      cancel-in-progress: false

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
