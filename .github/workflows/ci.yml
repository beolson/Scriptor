name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-lint-typecheck-test:
    name: Build, Lint, Typecheck & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build, lint, typecheck, and unit test
        run: bunx turbo run build lint typecheck test:unit

  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: build-lint-typecheck-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: web
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: bunx turbo run test:e2e
