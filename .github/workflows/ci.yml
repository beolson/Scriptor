name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-lint:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: source
        run: bun install --frozen-lockfile

      - name: Run tests
        working-directory: source
        run: bun test

      - name: Run Biome lint check
        working-directory: source
        run: bun run lint
