# Scriptor — host-specific setup script manifest

- id: setup-debian-devbox
  name: Setup Debian Devbox
  description: Installs a named Debian WSL instance and creates a passwordless local user
  platform: windows
  arch: x86
  script: scripts/Windows/setup-debian-devbox.ps1
  inputs:
    - id: instance-name
      type: string
      label: WSL instance name
      required: true
      default: Debian13Dev

- id: install-system-basics
  name: Install System Basics
  description: Updates system packages and installs curl, wget, and libicu-dev on Debian 13
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/Debian/13/install-system-basics.sh
  requires_sudo: true

- id: install-ohmybash
  name: Install Oh My Bash
  description: Installs Oh My Bash framework and sets the theme to agnoster
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/Debian/13/install-ohmybash.sh
  dependencies:
    - install-system-basics

- id: install-uv
  name: Install uv (Python)
  description: Installs the uv Python package manager with optional private certificate support
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/Debian/13/install-uv.sh
  dependencies:
    - install-system-basics

- id: install-git-gh
  name: Install Git & GitHub CLI
  description: Installs git and the GitHub CLI (gh) on Debian 13
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/Debian/13/install-git-gh.sh
  requires_sudo: true
  dependencies:
    - install-system-basics

- id: test-configure-tls-endpoint
  name: "[TEST] Configure TLS Endpoint"
  description: Test/demo script that simulates configuring a TLS endpoint with a certificate
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/Debian/13/test-configure-tls-endpoint.sh
  inputs:
    - id: cert
      type: ssl-cert
      label: Cert URL
      required: true
      download_path: /tmp/test-tls-cert.pem
      format: PEM

- id: install-az-azd
  name: Install Azure CLI & Azure Developer CLI
  description: Installs az and azd with optional private CA bundle configuration
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/Debian/13/install-az-azd.sh
  requires_sudo: true
  dependencies:
    - install-system-basics
  inputs:
    - id: private-certs-file
      type: string
      label: Private CA bundle path (leave blank if none)
      required: false

- id: install-bun
  name: Install Bun
  description: Installs the Bun JS runtime with optional private CA bundle configuration
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/Debian/13/install-bun.sh
  requires_sudo: true
  dependencies:
    - install-system-basics
  inputs:
    - id: private-certs-file
      type: string
      label: Private CA bundle path (leave blank if none)
      required: false

- id: setup-ssh-keys
  name: Setup SSH Keys
  description: Generates an Ed25519 SSH key pair and optionally uploads the public key to GitHub
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/Debian/13/setup-ssh-keys.sh
  inputs:
    - id: email
      type: string
      label: Email address (used as SSH key comment)
      required: true

- id: test-configure-ssh
  name: "[TEST] Configure SSH"
  description: Test/demo script that simulates configuring SSH access to a remote host
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/Debian/13/test-configure-ssh.sh
  requires_sudo: true

- id: configure-git
  name: Configure Git
  description: Sets global git user.name and user.email from provided inputs
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/Debian/13/configure-git.sh
  dependencies:
    - install-git-gh
  inputs:
    - id: name
      type: string
      label: Full name (e.g. Jane Smith)
      required: true
    - id: email
      type: string
      label: Email address (e.g. jane@example.com)
      required: true

- id: configure-npm-remote
  name: Configure Custom npm Registry
  description: Configures bun/npm to use a custom npm registry via ~/.npmrc; supports auth tokens and scoped registries
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/Debian/13/configure-npm-remote.sh
  dependencies:
    - install-bun
  inputs:
    - id: registry-url
      type: string
      label: "Registry URL (e.g. https://npm.pkg.github.com)"
      required: true
    - id: auth-token
      type: string
      label: Auth token (e.g. GitHub PAT with read:packages; leave blank to skip)
      required: false
    - id: scope
      type: string
      label: "npm scope to pin to this registry (e.g. @myorg; leave blank for global)"
      required: false

- id: configure-sshd
  name: Configure SSH Server
  description: Installs and hardens openssh-server per Mozilla guidelines; optionally imports and schedules daily sync of GitHub SSH keys
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/Debian/13/configure-sshd.sh
  requires_sudo: true
  dependencies:
    - install-system-basics
  inputs:
    - id: github-user
      type: string
      label: GitHub username for authorized keys (leave blank to skip)
      required: false

- id: install-nvidia-drivers
  name: Install NVIDIA Drivers
  description: Installs NVIDIA proprietary drivers, DKMS module, firmware, and CUDA toolkit on Debian 13; supports GTX 700 through RTX 40xx (Blackwell/RTX 50xx not supported)
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/Debian/13/install-nvidia-drivers.sh
  requires_sudo: true

- id: install-wsl
  name: Install WSL
  description: Enables the Windows Subsystem for Linux feature; required once before installing any WSL distribution
  platform: windows
  arch: x86
  requires_admin: true
  script: scripts/Windows/install-wsl.ps1
