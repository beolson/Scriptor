- id: update-system
  name: Update System Packages
  description: Updates apt package lists and upgrades installed packages
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/update-system.sh

- id: setup-prereqs
  name: Setup Prerequisites
  description: Installs common build tools and prerequisites (curl, git, build-essential)
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/setup-prereqs.sh
  dependencies:
    - update-system

- id: install-docker
  name: Install Docker
  description: Installs Docker Engine and Docker Compose plugin
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/install-docker.sh
  dependencies:
    - setup-prereqs

- id: install-bun
  name: Install Bun.js
  description: Installs the Bun JavaScript runtime via the official installer
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/install-bun.sh
  dependencies:
    - update-system

- id: install-nvm
  name: Install NVM
  description: Installs Node Version Manager for managing Node.js versions
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/install-nvm.sh

- id: broken-script
  name: Broken Script (Test Failure)
  description: A script that intentionally fails — used to test error handling in the TUI
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/broken-script.sh
