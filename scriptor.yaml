# Scriptor — host-specific setup script manifest

- id: setup-debian-devbox
  name: Setup WSL Debian Instance
  description: Creates a named Debian WSL instance with automatic user setup and SSH key transfer
  platform: windows
  arch: x86
  script: scripts/Windows/setup-debian-devbox.ps1
  inputs:
    - id: instance-name
      type: string
      label: WSL instance name
      required: false
      default: Debian13Dev

- id: install-system-basics
  name: Install System Basics
  description: Updates system packages and installs curl, wget, and libicu-dev on Debian 13
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/Debian/13/install-system-basics.sh
  requires_sudo: true

- id: install-ohmybash
  name: Install Oh My Bash
  description: Installs Oh My Bash framework and sets the theme to agnoster
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/Debian/13/install-ohmybash.sh
  dependencies:
    - install-system-basics

- id: install-uv
  name: Install uv (Python)
  description: Installs the uv Python package manager with optional private certificate support
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/Debian/13/install-uv.sh
  dependencies:
    - install-system-basics

- id: install-git-gh
  name: Install Git & GitHub CLI
  description: Installs git and the GitHub CLI (gh) on Debian 13
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/Debian/13/install-git-gh.sh
  requires_sudo: true
  dependencies:
    - install-system-basics

- id: test-configure-tls-endpoint
  name: "[TEST] Configure TLS Endpoint"
  description: Test/demo script that simulates configuring a TLS endpoint with a certificate
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/Debian/13/test-configure-tls-endpoint.sh
  inputs:
    - id: cert
      type: ssl-cert
      label: TLS certificate
      required: true
      download_path: /tmp/test-tls-cert.pem
      format: PEM

- id: test-configure-ssh
  name: "[TEST] Configure SSH"
  description: Test/demo script that simulates configuring SSH access to a remote host
  platform: linux
  arch: x86
  distro: Debian GNU/Linux
  version: "13"
  script: scripts/Debian/13/test-configure-ssh.sh
  requires_sudo: true
